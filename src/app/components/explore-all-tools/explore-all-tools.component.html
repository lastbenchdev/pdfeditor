<div class="min-h-screen pb-20 bg-main transition-colors duration-500" style="background-color: var(--bg-main);">
  <!-- Header -->
  <div class="max-w-7xl mx-auto pt-12 mb-12 px-6 text-center animate-fade-up">
    <h1 class="text-4xl md:text-5xl font-black -tracking-wider text-main mb-4">All PDF Tools</h1>
    <p class="text-lg text-muted font-medium max-w-2xl mx-auto">
      The complete toolkit for all your PDF requirements.
    </p>
  </div>

  <!-- Search -->
  <div class="max-w-7xl mx-auto mb-8 px-6 relative z-10">
    <app-search-bar (search)="onSearch($event)"></app-search-bar>
  </div>

  <!-- Category Navigation -->
  <app-category-nav
    [selectedCategoryId]="selectedCategoryId"
    (selectCategory)="onSelectCategory($event)"
  ></app-category-nav>

  <!-- Categories and Tools -->
  <div class="max-w-7xl mx-auto px-6 flex flex-col gap-6">
    @for (category of displayedCategories; track category) {
      <app-category-section
        [category]="category"
        [tools]="getFilteredToolsForCategory(category.id)"
      ></app-category-section>
    }

    <!-- No Results -->
    @if (filteredTools.length === 0) {
      <div class="text-center py-20 animate-fade-up">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-surface mb-6" style="background-color: var(--bg-surface);">
          <svg class="w-10 h-10 text-muted" style="color: var(--text-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
        <p class="text-xl font-bold text-muted mb-4" style="color: var(--text-muted);">No tools found matching your search.</p>
        <button (click)="resetFilters()" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline transition-colors">
          Clear filters and search
        </button>
      </div>
    }
  </div>
</div>
