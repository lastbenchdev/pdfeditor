<section
  class="relative overflow-hidden pt-12 pb-10 md:pt-16 md:pb-14 px-6 text-center bg-main transition-colors duration-500 min-h-[55vh] flex items-center justify-center"
  style="background-color: var(--bg-main);">
  <!-- Radial spotlight glow -->
  <div class="absolute inset-0 z-0 pointer-events-none">
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 w-[700px] h-[500px] rounded-full bg-indigo-500/10 dark:bg-indigo-500/20 blur-3xl">
    </div>
    <div
      class="absolute bottom-0 right-1/4 w-[400px] h-[300px] rounded-full bg-violet-500/8 dark:bg-violet-500/15 blur-3xl">
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-2xl mx-auto relative z-10 animate-fade-up">
    <!-- Badge -->
    <div
      class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-100 dark:bg-indigo-950/60 text-indigo-700 dark:text-indigo-300 text-xs font-black uppercase tracking-widest mb-6 border border-indigo-200 dark:border-indigo-800/60 shadow-sm">
      <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
      Next-Gen PDF Tools
    </div>

    <!-- Title -->
    <h1 class="text-5xl md:text-6xl font-black -tracking-wider leading-tight mb-6 text-main">
      All-in-one PDF tools. <br />
      <span
        class="bg-gradient-to-r from-indigo-600 via-violet-600 to-indigo-400 dark:from-indigo-400 dark:via-violet-400 dark:to-indigo-300 bg-clip-text text-transparent inline-block min-h-[1.3em]">
        {{ displayText }}
      </span>
    </h1>

    <!-- Description -->
    <p class="text-lg text-muted max-w-xl mx-auto font-medium leading-relaxed mb-8">
      Merge, split, compress, and edit your PDFs directly in your browser. <br />
      <span
        class="inline-block mt-4 px-4 py-2 rounded-xl bg-emerald-50 dark:bg-emerald-950/40 text-emerald-800 dark:text-emerald-300 font-bold text-sm border border-emerald-200 dark:border-emerald-800/50">
        ✓ Your files never leave your device
      </span>
    </p>

    <!-- CTA Button -->
    <div class="flex justify-center">
      <a routerLink="/tools"
        class="inline-flex items-center gap-2.5 px-7 py-3.5 rounded-xl bg-gradient-to-br from-indigo-600 to-violet-600 text-white font-black text-base hover:-translate-y-1 hover:shadow-xl hover:shadow-indigo-500/30 transition-all duration-300 border border-white/10">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.531 12.469 6.619 20.38a1 1 0 1 1-3-3l7.912-7.912" />
          <path d="M15.686 4.314A12.5 12.5 0 0 0 5.461 2.958 1 1 0 0 0 5.58 4.71a22 22 0 0 1 6.318 3.393" />
          <path
            d="M17.7 3.7a1 1 0 0 0-1.4 0l-4.6 4.6a1 1 0 0 0 0 1.4l2.6 2.6a1 1 0 0 0 1.4 0l4.6-4.6a1 1 0 0 0 0-1.4z" />
          <path d="M19.686 8.314a12.501 12.501 0 0 1 1.356 10.225 1 1 0 0 1-1.751-.119 22 22 0 0 0-3.394-6.319" />
        </svg>
        Explore all tools
      </a>
    </div>
  </div>
</section>
